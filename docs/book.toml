[book]
title = "tunnelbana"
description = "A high-performance identity proxy in Rust — configuration and plugin-development guide."
authors = ["Kushal Das <kushal@sunet.se"]
language = "en"
src = "src"

[output.html]
# Follow the visitor's OS light/dark preference automatically (mdbook switches on
# prefers-color-scheme): light theme in light mode, navy in dark mode.
default-theme = "light"
preferred-dark-theme = "navy"
no-section-label = false
git-repository-url = "https://github.com/SUNET/tunnelbana"
# Widen and tidy the wide reference tables (Key/Required/Default/Meaning).
additional-css = ["custom.css"]
additional-js = ["mermaid.min.js", "mermaid-init.js"]

[output.html.fold]
enable = true
level = 1

[preprocessor]

[preprocessor.mermaid]
command = "mdbook-mermaid"
