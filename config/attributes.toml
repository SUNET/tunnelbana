# Attribute map: internal name -> per-protocol external names.
# Mirrors SATOSA's internal_attributes.yaml.
#
# A profile entry is either a plain list of names or a detailed table with an
# `oid` and `friendly_name` (used by the SAML frontend's
# `attribute_name_format = "uri"` mode and matched inbound by the backend).

user_id_from_attrs = ["edupersonprincipalname"]

[attributes.mail]
openid = ["email"]
saml = { names = ["mail", "email", "emailAddress"], oid = "urn:oid:0.9.2342.19200300.100.1.3", friendly_name = "mail" }

[attributes.givenname]
openid = ["given_name"]
saml = { names = ["givenName"], oid = "urn:oid:2.5.4.42", friendly_name = "givenName" }

[attributes.surname]
openid = ["family_name"]
saml = { names = ["sn", "surname"], oid = "urn:oid:2.5.4.4", friendly_name = "sn" }

[attributes.name]
openid = ["name"]
saml = { names = ["displayName", "cn"], oid = "urn:oid:2.16.840.1.113730.3.1.241", friendly_name = "displayName" }

[attributes.edupersonprincipalname]
openid = ["sub"]
saml = { names = ["eduPersonPrincipalName"], oid = "urn:oid:1.3.6.1.4.1.5923.1.1.1.6", friendly_name = "eduPersonPrincipalName" }

# SAML subject-id (released by IdPs under the REFEDS Personalized Access
# entity category instead of eduPersonPrincipalName). The internal name matches
# eduID's literal `subject-id` so the `pairwiseid`/`nameid` micro-services see it.
[attributes.subject-id]
saml = { names = ["subject-id"], oid = "urn:oasis:names:tc:SAML:attribute:subject-id", friendly_name = "subject-id" }

# Pairwise identifier synthesized by the `pairwiseid` micro-service. Mapped so it
# can also be released to an SP as a SAML attribute when desired.
[attributes.pairwise-id]
saml = { names = ["pairwise-id"], oid = "urn:oasis:names:tc:SAML:attribute:pairwise-id", friendly_name = "pairwise-id" }
