# ── Backend: SAML2 SP (upstream IdP samlidp.labb.sunet.se) ───────────────────
[[backend]]
type = "saml2"
name = "Saml2"
  [backend.config]
  # SP entity id defaults to <base_url>/Saml2; key/cert reused from the SATOSA OP.
  sp_key_path = "keys/saml_backend.key"
  sp_cert_path = "keys/saml_backend.crt"
  idp_entity_id = "https://samlidp.labb.sunet.se/metadata"
  idp_sso_url = "https://samlidp.labb.sunet.se/sso"
  idp_cert_path = "keys/idp.crt"
  sign_authn_requests = true
  # ACS served at <base_url>/Saml2/acs (HTTP-POST); SP metadata at /Saml2/metadata.
